[graph]
all-features = true
no-default-features = false

# ============================================================
# DEPENDENCY BANS
# ============================================================
[bans]
multiple-versions = "deny"
# Workspace path dependencies have no version spec.
# cargo-deny 0.19+ flags these as wildcards. Allow them.
wildcards = "allow"
allow-wildcard-paths = true
highlight = "all"
# Transitive dep version splits we can't control
skip = [
    { crate = "core-foundation@0.9.4", reason = "system-configuration lags behind security-framework on core-foundation version" },
]

deny = [
    # --- Logging: standardize on tracing ---
    { name = "log4rs", wrappers = [] },
    { name = "env_logger", wrappers = [] },
    { name = "simple_logger", wrappers = [] },
    { name = "fern", wrappers = [] },

    # --- Async runtime: standardize on tokio ---
    { name = "async-std", wrappers = [] },
    { name = "smol", wrappers = [] },

    # --- Datetime: standardize on time crate ---
    { name = "chrono", wrappers = [] },

    # --- Serialization: no competing binary formats ---
    { name = "bincode", wrappers = [] },
    { name = "rmp-serde", wrappers = [] },
    { name = "prost", wrappers = [] },
    { name = "flatbuffers", wrappers = [] },
]


# ============================================================
# LICENSE CHECKING
# ============================================================
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# ============================================================
# SECURITY ADVISORY CHECKING
# ============================================================
[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = []

# ============================================================
# SOURCE RESTRICTIONS
# ============================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
