name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-packages:
    name: Packages (check + test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo deny check

  publish-check:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run -p limit3r
      - run: cargo publish --dry-run -p shedul3r-rs-sdk
      - run: cargo publish --dry-run -p pipelin3r

  check-shedul3r:
    name: shedul3r (check + test + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shedul3r
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shedul3r
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  version-sync:
    name: Version sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shedul3r version sync
        run: |
          SERVER_VERSION=$(grep -m1 '^version' apps/shedul3r/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          STUB_VERSION=$(grep -m1 '^version' packages/shedul3r-bin/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$SERVER_VERSION" != "$STUB_VERSION" ]; then
            echo "ERROR: shedul3r version mismatch!"
            echo "  Server: $SERVER_VERSION (apps/shedul3r/Cargo.toml)"
            echo "  Stub:   $STUB_VERSION (packages/shedul3r-bin/Cargo.toml)"
            exit 1
          fi
          echo "OK: both at $SERVER_VERSION"

  golden-tests:
    name: Golden Tests
    runs-on: ubuntu-latest
    needs: check-shedul3r
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shedul3r
      - run: cd apps/shedul3r && cargo build --release
      - run: bash golden-tests/compare.sh apps/shedul3r/target/release/shedul3r
