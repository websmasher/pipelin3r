# =============================================================================
# clippy.toml -- Guardrails for the repo crate (outbound port traits)
# =============================================================================
# Reference: docs/rust-setup/04-guardrails-clippy-toml.md
#
# Repository trait definitions (outbound ports). Depends only on domain-types.
# Defines interfaces — no concrete implementations, no side effects, no state.
#
# clippy.toml does not support inheritance -- this file is self-contained.
#
# Cargo.toml must include:
#   disallowed_methods = "deny"
#   disallowed_types = "deny"

# =============================================================================
# THRESHOLDS (same as workspace)
# =============================================================================

too-many-lines-threshold = 75
cognitive-complexity-threshold = 15
too-many-arguments-threshold = 7
type-complexity-threshold = 75
max-struct-bools = 3

# =============================================================================
# DISALLOWED METHODS (workspace bans + global state mutation)
# =============================================================================

disallowed-methods = [
    # -- Environment variable access --
    { path = "std::env::var", reason = "Port traits define interfaces -- no environment access, no side effects" },
    { path = "std::env::var_os", reason = "Port traits define interfaces -- no environment access, no side effects" },
    { path = "std::env::vars", reason = "Port traits define interfaces -- no environment access, no side effects" },

    # -- Environment variable mutation --
    { path = "std::env::set_var", reason = "Unsafe in multi-threaded contexts -- environment mutation is not thread-safe" },
    { path = "std::env::remove_var", reason = "Unsafe in multi-threaded contexts -- environment mutation is not thread-safe" },

    # -- Process control --
    { path = "std::process::exit", reason = "Use proper error propagation (return Result from main) -- process::exit skips destructors" },
    { path = "std::process::Command::new", reason = "Shell execution not permitted in this service" },

    # -- Blocking sleep --
    { path = "std::thread::sleep", reason = "Use tokio::time::sleep for async context -- std::thread::sleep blocks the tokio runtime" },

    # -- Filesystem operations --
    { path = "std::fs::read_to_string", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::read", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::read_dir", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::read_link", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::write", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::remove_file", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::remove_dir_all", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::create_dir_all", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::rename", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::copy", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::metadata", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::symlink_metadata", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::canonicalize", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::set_permissions", reason = "Port traits define interfaces -- no filesystem access, no side effects" },
    { path = "std::fs::hard_link", reason = "Port traits define interfaces -- no filesystem access, no side effects" },

    # -------------------------------------------------------------------------
    # HTTP client construction -- use shared client via DI
    # -------------------------------------------------------------------------
    # Constructing reqwest::Client per-request skips connection pooling and
    # leaks resources. All HTTP clients must be constructed once at startup
    # and injected via application state.
    { path = "reqwest::Client::new", reason = "Port traits define interfaces -- no HTTP client construction" },
    { path = "reqwest::Client::builder", reason = "Port traits define interfaces -- no HTTP client construction" },
]

# =============================================================================
# DISALLOWED TYPES (workspace bans + global state bans)
# =============================================================================

disallowed-types = [
    # -- Collections --
    { path = "std::collections::HashMap", reason = "Use BTreeMap for deterministic iteration order" },
    { path = "std::collections::HashSet", reason = "Use BTreeSet for deterministic iteration order" },

    # -- Synchronization --
    { path = "std::sync::Mutex", reason = "Use parking_lot::Mutex -- no poisoning, better performance" },
    { path = "std::sync::RwLock", reason = "Use parking_lot::RwLock -- no poisoning, better performance" },

    # -- Filesystem --
    { path = "std::fs::File", reason = "Port traits define interfaces -- no direct file handle construction" },

    # -- Global state (domain/ports/app crates only) --
    # Business logic must be pure: all data comes in via function parameters.
    # Global state creates hidden dependencies that make functions untestable
    # and break dependency injection.
    { path = "std::sync::LazyLock", reason = "Port traits define interfaces -- no global state, all data via function parameters" },
    { path = "std::sync::OnceLock", reason = "Port traits define interfaces -- no global state, all data via function parameters" },
    { path = "once_cell::sync::OnceCell", reason = "Port traits define interfaces -- no global state, all data via function parameters" },
    { path = "once_cell::sync::Lazy", reason = "Port traits define interfaces -- no global state, all data via function parameters" },
]
