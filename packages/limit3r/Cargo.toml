[package]
name = "limit3r"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Resilience patterns: rate limiter, circuit breaker, bulkhead"
license = "MIT"
repository = "https://github.com/3jane/pipelin3r"
keywords = ["rate-limiting", "circuit-breaker", "bulkhead", "resilience"]
categories = ["concurrency", "network-programming"]

[dependencies]
tokio = { version = "1", features = ["time", "sync"] }
tracing = "0.1"
parking_lot = "0.12"

[lints]
workspace = true
