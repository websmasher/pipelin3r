[package]
name = "shedul3r-rs-sdk"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Rust client SDK for shedul3r task execution server"
license = "MIT"
repository = "https://github.com/3jane/pipelin3r"
keywords = ["task-queue", "scheduling", "sdk", "client"]
categories = ["api-bindings", "asynchronous"]
readme = "README.md"
exclude = [".plans/", ".worklogs/"]

[dependencies]
reqwest = { version = "0.12", features = ["json", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["time", "fs", "macros"] }
urlencoding = "2"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
