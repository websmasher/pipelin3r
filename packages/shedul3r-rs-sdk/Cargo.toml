[package]
name = "shedul3r-rs-sdk"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Rust client SDK for shedul3r task execution server"
license = "MIT"
repository = "https://github.com/3jane/pipelin3r"
keywords = ["task-queue", "scheduling", "sdk", "client"]
categories = ["api-bindings", "asynchronous"]
readme = "README.md"

[dependencies]
anyhow = "1"
reqwest = { version = "0.12", features = ["json", "multipart"] }
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["time", "fs", "macros"] }

[lints]
workspace = true
