[package]
name = "pipelin3r"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Pipeline orchestration for LLM-powered workflows"
license = "MIT"
repository = "https://github.com/3jane/pipelin3r"
keywords = ["pipeline", "llm", "orchestration", "workflow"]
categories = ["development-tools", "asynchronous"]
readme = "README.md"
exclude = [".plans/", ".worklogs/"]

[dependencies]
base64 = "0.22"
limit3r = { version = "0.1.0", path = "../limit3r" }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shedul3r-rs-sdk = { version = "0.1.0", path = "../shedul3r-rs-sdk" }
thiserror = "2"
tokio = { version = "1", features = ["rt", "macros", "time", "sync", "process", "fs"] }
toml = "0.8"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
