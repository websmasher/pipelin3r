[package]
name = "pipelin3r"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Pipeline orchestration for LLM-powered workflows"
license = "MIT"
repository = "https://github.com/3jane/pipelin3r"
keywords = ["pipeline", "llm", "orchestration", "workflow"]
categories = ["development-tools", "asynchronous"]
readme = "README.md"

[dependencies]
shedul3r-rs-sdk = { path = "../shedul3r-rs-sdk" }
serde_json = "1"
tempfile = "3"
thiserror = "2"
tokio = { version = "1", features = ["rt", "macros", "time", "sync", "process", "fs"] }
toml = "0.8"
tracing = "0.1"

[dev-dependencies]

[lints]
workspace = true
