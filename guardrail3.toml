version = "0.1"

[profile]
name = "service"

[rust]
workspace_root = "."

[rust.checks]
architecture = true      # R-ARCH-*, R-DEPS-* — hex arch structure and dependency flow
garde = false            # R-GARDE-* disabled: garde adoption deferred — add Validate to Deserialize structs incrementally
tests = true             # R-TEST-* — test quality and organization
release = true           # R-REL-*, R-PUB-*, R-BIN-* — crate publish readiness

# --- Libraries (in packages/) ---
[rust.crates.limit3r]
profile = "library"
layer = "pure"
allowed_deps = ["serde", "thiserror", "tokio", "tracing", "parking_lot"]

[rust.crates.shedul3r-rs-sdk]
profile = "library"
layer = "pure"
allowed_deps = ["reqwest", "serde", "serde_json", "thiserror", "tokio", "urlencoding"]

[rust.crates.pipelin3r]
profile = "library"
layer = "pure"
allowed_deps = ["shedul3r-rs-sdk", "serde_json", "thiserror", "tokio", "toml", "tracing"]

# --- Binary stub ---
[rust.crates.shedul3r-bin]
profile = "service"
layer = "composition-root"

[local]
clippy_methods = "local/clippy-methods.toml"
clippy_types = "local/clippy-types.toml"
deny_bans = "local/deny-bans.toml"
deny_skip = "local/deny-skip.toml"
deny_feature_bans = "local/deny-feature-bans.toml"
